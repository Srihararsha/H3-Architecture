<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H3 SSM Mathematical Trace Dashboard</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- KaTeX for Beautiful LaTeX Render -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  
  <!-- Structured data output by the execution script -->
  <script defer src="h3_index.js"></script>

  
  <style>
    :root {
      --bg-base: #070913;
      --bg-surface: rgba(15, 22, 42, 0.65);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.25);
      --secondary: #06b6d4;
      --secondary-glow: rgba(6, 182, 212, 0.2);
      --accent: #f43f5e;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-dark: #64748b;
      --glass-blur: 16px;
      --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-base);
      background-image: 
        radial-gradient(at 10% 20%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 90% 80%, rgba(6, 182, 212, 0.12) 0px, transparent 50%);
      background-attachment: fixed;
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* Header styling */
    header {
      background: rgba(7, 9, 19, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      box-shadow: 0 0 16px var(--primary-glow);
    }

    .brand-name h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-name p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .header-controls {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 8px 16px 8px 36px;
      color: white;
      font-family: inherit;
      font-size: 0.85rem;
      width: 220px;
      transition: var(--transition-fast);
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 12px var(--primary-glow);
      width: 280px;
    }

    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      fill: var(--text-muted);
    }

    /* Main visual layout */
    .dashboard-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Sidebar Index */
    .sidebar {
      width: 320px;
      border-right: 1px solid var(--border-color);
      background: rgba(7, 9, 19, 0.4);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 24px 12px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .filter-pills {
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .pill {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .pill:hover, .pill.active {
      background: rgba(139, 92, 246, 0.15);
      border-color: var(--primary);
      color: white;
    }

    .index-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .index-item {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition-fast);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .index-item:hover {
      background: rgba(255, 255, 255, 0.02);
      color: white;
    }

    .index-item.active {
      background: linear-gradient(90deg, rgba(139, 92, 246, 0.12), rgba(6, 182, 212, 0.02));
      border-left: 3px solid var(--primary);
      color: white;
      padding-left: 11px;
    }

    .step-badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      font-weight: 600;
    }

    .badge-section { background: rgba(139, 92, 246, 0.2); color: #d8b4fe; }
    .badge-subsection { background: rgba(6, 182, 212, 0.2); color: #22d3ee; }
    .badge-equation { background: rgba(244, 63, 94, 0.2); color: #fda4af; }
    .badge-tensor { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
    .badge-text { background: rgba(100, 116, 139, 0.2); color: #cbd5e1; }

    /* Viewer Container */
    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 32px;
      gap: 24px;
    }

    /* Content Cards */
    .card {
      background: var(--bg-surface);
      backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: slideIn var(--transition-smooth);
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header-step {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 16px;
    }

    .card-title-step {
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.01em;
    }

    /* Section Step View */
    .section-view {
      text-align: center;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .section-view h2 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #c084fc, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .section-view p {
      color: var(--text-muted);
      font-size: 1.05rem;
      max-width: 500px;
    }

    /* Equation Step View */
    .equation-view {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 10px 0;
    }

    .math-block {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      overflow-x: auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .math-desc {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    /* Tensor Step View */
    .tensor-view {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .tensor-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: white;
    }

    .stat-card.primary-stat .stat-value {
      color: var(--secondary);
    }

    .tensor-values-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tensor-values-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .tensor-grid {
      background: #02040a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a7f3d0;
    }

    .tensor-val-item {
      display: inline-block;
      margin-right: 12px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: var(--transition-fast);
    }

    .tensor-val-item.positive {
      color: #34d399;
      background: rgba(52, 211, 153, 0.05);
    }

    .tensor-val-item.negative {
      color: #f87171;
      background: rgba(248, 113, 113, 0.05);
    }

    .tensor-val-item.trunc {
      color: #a78bfa;
      font-weight: 600;
      display: block;
      margin: 12px 0;
      text-align: center;
    }

    /* Stepper Controls */
    .controls-bar {
      background: rgba(15, 22, 42, 0.85);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-color);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      z-index: 10;
    }

    .stepper-btns {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--text-muted);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      border: none;
      box-shadow: 0 4px 16px var(--primary-glow);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #9333ea, #6d28d9);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
      transform: translateY(-1px);
    }

    .btn-round {
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .btn-copy {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      transition: all 0.2s ease;
      font-family: inherit;
      height: 28px;
    }

    .btn-copy:hover {
      background: rgba(16, 185, 129, 0.15);
      color: var(--secondary);
      border-color: rgba(16, 185, 129, 0.3);
    }

    .btn-copy.copied {
      background: var(--secondary);
      color: #0b0f19 !important;
      border-color: var(--secondary);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }

    .progress-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 600px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .progress-track {
      background: rgba(255, 255, 255, 0.05);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Text block view */
    .text-view {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #e2e8f0;
      white-space: pre-wrap;
    }

    /* Helper Utilities */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 100%;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      stroke: var(--text-dark);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Preloader Screen -->
  <div id="preloader" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-base); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; transition: opacity 0.4s ease-out;">
    <div style="font-size: 3rem; font-weight: 700; color: transparent; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; animation: pulse 2s infinite;">H3 SSM</div>
    <div style="width: 260px; height: 6px; background: rgba(255, 255, 255, 0.06); border-radius: 999px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08);">
      <div id="preloader-progress" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 999px; transition: width 0.1s linear;"></div>
    </div>
    <div id="preloader-status" style="font-family: monospace; font-size: 0.85rem; color: var(--text-muted);">Allocating trace memories (0%)...</div>
  </div>

  <!-- Top bar -->
  <header>
    <div class="brand">
      <div class="brand-logo">H3</div>
      <div class="brand-name">
        <h1>H3 SSM mathematical visualizer</h1>
        <p>Interactive step-by-step tensor trace debugger</p>
      </div>
    </div>
    
    <div class="header-controls">
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-input" placeholder="Search parameters or values..." oninput="handleSearch()">
      </div>
    </div>
  </header>

  <!-- Main Body Layout -->
  <div class="dashboard-layout">
    
    <!-- Left Navigation Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span>Execution Steps</span>
        <span id="step-count-badge" style="font-size: 0.75rem; color: var(--primary);">0 / 0</span>
      </div>
      
      <div class="filter-pills">
        <span class="pill active" id="pill-all" onclick="filterSteps('all')">All</span>
        <span class="pill" id="pill-section" onclick="filterSteps('section')">Sections</span>
        <span class="pill" id="pill-equation" onclick="filterSteps('equation')">Formulas</span>
        <span class="pill" id="pill-tensor" onclick="filterSteps('tensor')">Tensors</span>
      </div>
      
      <div class="index-list" id="index-list">
        <!-- Rendered dynamically -->
      </div>
    </div>
    
    <!-- Main Viewer Area -->
    <div class="viewer" id="viewer-area">
      <!-- Active step rendered dynamically inside a card -->
    </div>
    
  </div>

  <!-- Bottom Control Bar -->
  <div class="controls-bar">
    <div class="stepper-btns">
      <button class="btn btn-round" id="btn-prev" onclick="navigateStep(-1)" title="Previous Step" disabled>
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      
      <button class="btn btn-round" id="btn-play" onclick="togglePlay()" title="Auto Play presentation">
        <svg id="play-icon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      
      <button class="btn btn-round" id="btn-next" onclick="navigateStep(1)" title="Next Step">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
    </div>
    
    <div class="progress-container">
      <div class="progress-labels">
        <span id="current-step-label">Step 0 of 0</span>
        <span id="completion-percentage">0% Complete</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
    
    <div>
      <button class="btn btn-primary" id="btn-reset" onclick="jumpToStep(0)">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        Reset
      </button>
    </div>
  </div>

  <script defer src="dashboard.js"></script>
</body>
</html>
